services:
  cv-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: smart-cv-layers:dev
    container_name: smart_cv_dev
    shm_size: '8gb'
    volumes:
      - .:/app
      - ${SSH_AUTH_SOCK}:/run/ssh-agent # Maps your host's SSH socket
    environment:
      - SSH_AUTH_SOCK=/run/ssh-agent    # Tells Git where to find the socket
    working_dir: /app
    stdin_open: true 
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
